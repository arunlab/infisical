apiVersion: v1
kind: Pod
metadata:
  name: gemini-secret-reader
  namespace: forge-secrets-test
spec:
  restartPolicy: Never
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - cat /mnt/gemini/GEMINI_API_KEY && echo
      volumeMounts:
        - name: gemini-secret
          mountPath: /mnt/gemini
          readOnly: true
  volumes:
    - name: gemini-secret
      secret:
        secretName: gemini-api-key
